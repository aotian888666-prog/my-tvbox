name: Auto Update TVBox Interface

on:
  schedule:
    - cron: '0 20 * * *' # 每天北京时间凌晨4点全自动执行一次
  workflow_dispatch: # 允许你随时随地手动点击运行

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          pip install requests

      - name: Download and Merge Sources
        run: |
          python -c "
          import requests
          import json
          import re

          # 真正稳定、高清（含大量大厂网盘、4K原画）的顶级大厂接口
          urls = [
              'https://mirror.ghproxy.com/https://raw.githubusercontent.com/FongMi/CatVodSpider/main/json/config.json', # FongMi官方纯净线
              'http://饭太硬.com/tv', # 圈内最著名的饭太硬综合线
              'http://小雅.tv/tv', # 小雅高清网盘专属线
              'https://100km.top/0' # 备用单仓线
          ]

          final_sites = []
          final_lives = []
          spider_url = ''
          wallpaper_url = 'https://picsum.photos/1024/768'

          headers = {'User-Agent': 'Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36'}

          for url in urls:
              try:
                  res = requests.get(url, headers=headers, timeout=10)
                  if res.status_code != 200:
                      continue
                  
                  # 尝试清除部分加密或混淆字符，强行解析标准JSON
                  text = res.text
                  text = re.sub(r'//.*', '', text) # 去除单行注释
                  data = json.loads(text)
                  
                  # 提取爬虫核心（如果没有，就用第一个抓到的）
                  if 'spider' in data and not spider_url:
                      spider_url = data['spider']
                  
                  # 融合影视源站点，并根据 key 去重，防止重复出现
                  if 'sites' in data:
                      for site in data['sites']:
                          if site.get('key') and site['key'] not in [s.get('key') for s in final_sites]:
                              final_sites.append(site)
                  
                  # 融合电视直播源
                  if 'lives' in data:
                      for live in data['lives']:
                          if live.get('url') and live['url'] not in [l.get('url') for l in final_lives]:
                              final_lives.append(live)
              except Exception as e:
                  print(f'解析源 {url} 失败: {e}')

          # 如果连顶级源都挂了，给一个保底壳，防止App闪退
          if not spider_url:
              spider_url = 'https://mirror.ghproxy.com/https://raw.githubusercontent.com/FongMi/CatVodSpider/main/jar/custom.jar'

          # 组装成一个格式绝对完美的标准影视仓 JSON
          result = {
              'spider': spider_url,
              'wallpaper': wallpaper_url,
              'sites': final_sites,
              'lives': final_lives
          }

          with open('index.json', 'w', encoding='utf-8') as f:
              json.dump(result, f, ensure_ascii=False, indent=2)
          print('专属纯净接口合并成功！')
          "

      - name: Commit and Push changes
        run: |
          git config --local user.email "actions@github.com"
          git config --local user.name "GitHub Actions"
          git add index.json
          git commit -m "Merged premium 4K sources" || exit 0
          git push
