name: Auto Update TVBox Interface

on:
  schedule:
    - cron: '0 20 * * *' # 每天凌晨4点自动运行
  workflow_dispatch: # 允许手动点击运行

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          pip install requests

      - name: Download and Merge Sources
        run: |
          python -c "
          import requests
          import json

          # 1. 精选圈内最稳定、没有乱七八糟加密的标准大厂多仓源（包含点播）
          # 这里直接引入 FongMi 的官方标准源，它的点播站覆盖了全网最稳的电影、网盘和独家解析
          vod_url = 'https://mirror.ghproxy.com/https://raw.githubusercontent.com/FongMi/CatVodSpider/main/json/config.json'
          
          # 2. 精选国内最稳定的超清直播源
          live_sources = [
              {
                  'name': '天高高清直播',
                  'type': 0,
                  'url': 'https://mirror.ghproxy.com/https://raw.githubusercontent.com/ssili126/tv/main/itvlist.txt',
                  'playerType': 1
              },
              {
                  'name': '范明明超清源(IPv6)',
                  'type': 0,
                  'url': 'https://mirror.ghproxy.com/https://raw.githubusercontent.com/fanmingming/live/main/tv/m3u/ipv6.m3u',
                  'playerType': 1
              }
          ]

          headers = {'User-Agent': 'Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36'}

          try:
              res = requests.get(vod_url, headers=headers, timeout=10)
              if res.status_code == 200:
                  # 直接把大厂完美的点播配置拉下来
                  config_data = res.json()
              else:
                  raise Exception('请求主源失败')
          except Exception as e:
              print(f'使用保底本地配置: {e}')
              config_data = {
                  'spider': 'https://mirror.ghproxy.com/https://raw.githubusercontent.com/FongMi/CatVodSpider/main/jar/custom.jar',
                  'sites': []
              }

          # 3. 如果大厂源里自带了直播，我们将我们自己的高清直播源插到最前面
          if 'lives' in config_data:
              config_data['lives'] = live_sources + config_data['lives']
          else:
              config_data['lives'] = live_sources

          # 4. 强行补全可能缺失的壁纸或爬虫内核，确保万无一失
          if 'spider' not in config_data or not config_data['spider']:
              config_data['spider'] = 'https://mirror.ghproxy.com/https://raw.githubusercontent.com/FongMi/CatVodSpider/main/jar/custom.jar'
          config_data['wallpaper'] = 'https://picsum.photos/1024/768'

          # 5. 输出格式绝对标准的 JSON 文件
          with open('index.json', 'w', encoding='utf-8') as f:
              json.dump(config_data, f, ensure_ascii=False, indent=2)
          print('点播 + 直播完美缝合成功！')
          "

      - name: Commit and Push changes
        run: |
          git config --local user.email "actions@github.com"
          git config --local user.name "GitHub Actions"
          git add index.json
          git commit -m "Perfect merge of VOD and Live TV" || exit 0
          git push
